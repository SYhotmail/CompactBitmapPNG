excluded:
  - .build
  - .swiftpm
  - CompactBitmapPNG.xcodeproj

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - overridden_super_call
  - prohibited_super_call
  - redundant_nil_coalescing
  - sorted_imports
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces
  - indentation_width

disabled_rules:
  - todo

line_length:
  warning: 160
  error: 220
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 80
  error: 150

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 700
  error: 900

cyclomatic_complexity:
  warning: 15
  error: 25

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 3

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - x
    - y

indentation_width:
  indentation_width: 4

reporter: xcode
