name: PNGCompressorPDFVectorCheck
options:
  minimumXcodeGenVersion: 2.44.1
  deploymentTarget:
    macOS: "14.0"
packages:
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    exactVersion: 1.26.0
  Dependencies:
    url: https://github.com/pointfreeco/swift-dependencies
    exactVersion: 1.14.1
  CasePaths:
    url: https://github.com/pointfreeco/swift-case-paths
    exactVersion: 1.8.0
  Perception:
    url: https://github.com/pointfreeco/swift-perception
    exactVersion: 2.0.10
settings:
  base:
    SWIFT_VERSION: 6.0
    PRODUCT_NAME: "$(TARGET_NAME)"
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    MACOSX_DEPLOYMENT_TARGET: 14.0
    ENABLE_HARDENED_RUNTIME: NO
targets:
  PNGCompressorPDFVectorCheck:
    type: application
    platform: macOS
    sources:
      - path: Sources/PNGCompressorPDFVectorCheck
        excludes:
          - Resources/Info.plist
    info:
      path: Sources/PNGCompressorPDFVectorCheck/Resources/Info.plist
    dependencies:
      - package: ComposableArchitecture
        product: ComposableArchitecture
      - package: Dependencies
        product: Dependencies
      - package: CasePaths
        product: CasePaths
      - package: Perception
        product: Perception
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.siarheiy.PNGCompressorPDFVectorCheck
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
    scheme:
      testTargets:
        - PNGCompressorPDFVectorCheckTests
        - PNGCompressorPDFVectorCheckUITests

  PNGCompressorPDFVectorCheckTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/PNGCompressorPDFVectorCheckTests
    dependencies:
      - target: PNGCompressorPDFVectorCheck
      - package: ComposableArchitecture
        product: ComposableArchitecture
      - package: Dependencies
        product: Dependencies
      - package: CasePaths
        product: CasePaths
      - package: Perception
        product: Perception
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.siarheiy.PNGCompressorPDFVectorCheckTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PNGCompressorPDFVectorCheck.app/Contents/MacOS/PNGCompressorPDFVectorCheck"

  PNGCompressorPDFVectorCheckUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: UITests/PNGCompressorPDFVectorCheckUITests
    dependencies:
      - target: PNGCompressorPDFVectorCheck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.siarheiy.PNGCompressorPDFVectorCheckUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: PNGCompressorPDFVectorCheck
