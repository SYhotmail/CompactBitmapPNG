name: PNGCompressorPDFVectorCheck
options:
  minimumXcodeGenVersion: 2.44.1
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    PRODUCT_NAME: "$(TARGET_NAME)"
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    MACOSX_DEPLOYMENT_TARGET: 14.0
    ENABLE_HARDENED_RUNTIME: NO
targets:
  PNGCompressorPDFVectorCheck:
    type: application
    platform: macOS
    sources:
      - path: Sources/PNGCompressorPDFVectorCheck
        excludes:
          - Info.plist
    info:
      path: Sources/PNGCompressorPDFVectorCheck/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.siarheiy.PNGCompressorPDFVectorCheck
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
    scheme:
      testTargets:
        - PNGCompressorPDFVectorCheckTests

  PNGCompressorPDFVectorCheckTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/PNGCompressorPDFVectorCheckTests
    dependencies:
      - target: PNGCompressorPDFVectorCheck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.siarheiy.PNGCompressorPDFVectorCheckTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PNGCompressorPDFVectorCheck.app/Contents/MacOS/PNGCompressorPDFVectorCheck"
