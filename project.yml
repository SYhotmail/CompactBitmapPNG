name: CompactBitmapPNG
options:
  minimumXcodeGenVersion: 2.44.1
  deploymentTarget:
    macOS: "14.0"
packages:
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    exactVersion: 1.26.0
  Dependencies:
    url: https://github.com/pointfreeco/swift-dependencies
    exactVersion: 1.14.1
  CasePaths:
    url: https://github.com/pointfreeco/swift-case-paths
    exactVersion: 1.8.0
  Perception:
    url: https://github.com/pointfreeco/swift-perception
    exactVersion: 2.0.10
  Sharing:
    url: https://github.com/pointfreeco/swift-sharing
    exactVersion: 2.9.1
  SwiftNavigation:
    url: https://github.com/pointfreeco/swift-navigation
    exactVersion: 2.10.3
settings:
  base:
    SWIFT_VERSION: 6.0
    PRODUCT_NAME: "$(TARGET_NAME)"
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    MACOSX_DEPLOYMENT_TARGET: 14.0
    ENABLE_HARDENED_RUNTIME: NO
targets:
  CompactBitmapPNG:
    type: application
    platform: macOS
    sources:
      - path: Sources/CompactBitmapPNG
        excludes:
          - Resources/Info.plist
    info:
      path: Sources/CompactBitmapPNG/Resources/Info.plist
    dependencies:
      - package: ComposableArchitecture
        product: ComposableArchitecture
      - package: Dependencies
        product: Dependencies
      - package: CasePaths
        product: CasePaths
      - package: Perception
        product: Perception
      - package: Sharing
        product: Sharing
      - package: SwiftNavigation
        product: SwiftNavigation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.siarheiy.CompactBitmapPNG
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
    prebuildScripts:
      - name: SwiftLint
        script: |
          export PATH="$PATH:/opt/homebrew/bin:/usr/local/bin"
          if which swiftlint > /dev/null; then
            swiftlint lint --quiet
          else
            echo "warning: SwiftLint not installed. Run 'brew install swiftlint'."
          fi
        basedOnDependencyAnalysis: false
    scheme:
      testTargets:
        - CompactBitmapPNGTests
        - CompactBitmapPNGUITests
      testPlans:
        - path: CompactBitmapPNG.xctestplan
          defaultPlan: true

  CompactBitmapPNGTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/CompactBitmapPNGTests
    dependencies:
      - target: CompactBitmapPNG
      - package: ComposableArchitecture
        product: ComposableArchitecture
      - package: Dependencies
        product: Dependencies
      - package: CasePaths
        product: CasePaths
      - package: Perception
        product: Perception
      - package: Sharing
        product: Sharing
      - package: SwiftNavigation
        product: SwiftNavigation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.siarheiy.CompactBitmapPNGTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/CompactBitmapPNG.app/Contents/MacOS/CompactBitmapPNG"

  CompactBitmapPNGUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: UITests/CompactBitmapPNGUITests
    dependencies:
      - target: CompactBitmapPNG
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.siarheiy.CompactBitmapPNGUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: CompactBitmapPNG
